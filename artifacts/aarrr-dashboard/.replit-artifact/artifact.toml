kind = "web"
previewPath = "/"
title = "AARRR + GA 대시보드 빌더"
version = "1.0.0"
id = "artifacts/aarrr-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22523

[services.development]
run = "pnpm --filter @workspace/aarrr-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aarrr-dashboard", "run", "build" ]
publicDir = "artifacts/aarrr-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22523"
BASE_PATH = "/"
